<script>
(function(){
    // Yes/No buttons
    document.querySelectorAll('.zf-yn-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var fld = this.getAttribute('data-fld');
            var val = this.getAttribute('data-val');
            this.parentElement.querySelectorAll('.zf-yn-btn').forEach(function(b){ b.classList.remove('sel'); });
            this.classList.add('sel');
            document.getElementById(fld).value = val;
        });
    });

    // Step navigation
    window.zfNextStep = function() {
        var fn = document.getElementById('zf-firstname').value.trim();
        var ln = document.getElementById('zf-lastname').value.trim();
        var em = document.getElementById('zf-email').value.trim();
        var ph = document.getElementById('zf-phone').value.trim();
        var ct = document.getElementById('zf-city').value.trim();
        var pv = document.getElementById('zf-province').value.trim();
        
        if (!fn) { alert('First Name is required.'); document.getElementById('zf-firstname').focus(); return; }
        if (!ln) { alert('Last Name is required.'); document.getElementById('zf-lastname').focus(); return; }
        if (!em) { alert('Email is required.'); document.getElementById('zf-email').focus(); return; }
        if (!ph) { alert('Phone is required.'); document.getElementById('zf-phone').focus(); return; }
        if (!ct) { alert('City is required.'); document.getElementById('zf-city').focus(); return; }
        if (!pv) { alert('Province is required.'); document.getElementById('zf-province').focus(); return; }
        
        // Validate email format
        var at = em.indexOf('@'), dot = em.lastIndexOf('.');
        if (at < 1 || dot < at + 2 || dot + 2 >= em.length) { alert('Please enter a valid email.'); document.getElementById('zf-email').focus(); return; }
        
        document.getElementById('zf-step1').classList.remove('active');
        document.getElementById('zf-step2').classList.add('active');
        document.getElementById('zf-s1-ind').classList.remove('active');
        document.getElementById('zf-s1-ind').classList.add('done');
        document.getElementById('zf-s2-ind').classList.add('active');
        document.getElementById('zf-line').classList.add('active');
    };

    window.zfPrevStep = function() {
        document.getElementById('zf-step2').classList.remove('active');
        document.getElementById('zf-step1').classList.add('active');
        document.getElementById('zf-s2-ind').classList.remove('active');
        document.getElementById('zf-s1-ind').classList.remove('done');
        document.getElementById('zf-s1-ind').classList.add('active');
        document.getElementById('zf-line').classList.remove('active');
    };

    // Validation
    window.zfCheckMandatory = function() {
        var fn = document.getElementById('zf-firstname').value.trim();
        var ln = document.getElementById('zf-lastname').value.trim();
        var em = document.getElementById('zf-email').value.trim();
        var ph = document.getElementById('zf-phone').value.trim();
        
        if (!fn) { alert('First Name is required.'); return false; }
        if (!ln) { alert('Last Name is required.'); return false; }
        if (!em) { alert('Email is required.'); return false; }
        if (!ph) { alert('Phone is required.'); return false; }
        
        // Validate email format
        var at = em.indexOf('@'), dot = em.lastIndexOf('.');
        if (at < 1 || dot < at + 2 || dot + 2 >= em.length) { alert('Please enter a valid email.'); return false; }
        
        document.getElementById('zf-submit').disabled = true;
        return true;
    };
})();
</script>
